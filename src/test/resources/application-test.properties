spring.application.name=dev-test
server.port=0

spring.datasource.url=jdbc:h2:mem:publicplus-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never

spring.data.redis.host=127.0.0.1
spring.data.redis.port=0
spring.data.redis.repositories.enabled=false
spring.cache.type=simple

spring.mail.host=127.0.0.1
spring.mail.port=3025
spring.mail.username=springboot
spring.mail.password=springboot
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.connectionTimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writeTimeout=5000

FACILITY_API_KEY=dummy-test-facility-api-key
FACILITY_URL=http://localhost/test-facility-api
google.redirect.uri=http://localhost:8080/test-google-callback
GOOGLE.REDIRECT.URI=http://localhost:8080/test-google-callback
google.calendar.client-id=dummy-test-google-calendar-client-id
google.calendar.client-secret=dummy-test-google-calendar-client-secret
google.calendar.api-key=dummy-test-google-calendar-api-key

naver.api.base-url=http://localhost/test-naver-api
naver.api.clientId=dummy-test-naver-client-id
naver.api.clientSecret=dummy-test-naver-client-secret

file.dir=./build/test-upload
spring.web.resources.static-locations=file:./build/test-upload/
imageFile.path=http://localhost:8080/test-images/

JwtToken.secret_key=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
JwtToken.accessExpTime=86400000
JwtToken.refreshExpTime=2592000000

spring.security.oauth2.client.registration.kakao.client-name=kakao
spring.security.oauth2.client.registration.kakao.client-id=dummy-test-kakao-client-id
spring.security.oauth2.client.registration.kakao.client-secret=dummy-test-kakao-client-secret
spring.security.oauth2.client.registration.kakao.scope=profile_nickname, profile_image, account_email
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

spring.security.oauth2.client.registration.naver.client-name=naver
spring.security.oauth2.client.registration.naver.client-id=dummy-test-naver-oauth-client-id
spring.security.oauth2.client.registration.naver.client-secret=dummy-test-naver-oauth-client-secret
spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost:8080/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

spring.security.oauth2.client.registration.google.client-name=google
spring.security.oauth2.client.registration.google.client-id=dummy-test-google-oauth-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-test-google-oauth-client-secret
spring.security.oauth2.client.registration.google.scope=email, profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_post

auth-code-expiration-millis=180000
spring.websocket.enabled=true
spring.websocket.allowed-origins=*
